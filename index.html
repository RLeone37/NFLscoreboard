<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NFL Scores"/>
<meta name="theme-color" content="#080a0f"/>
<title>NFL Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:        #080a0f;
–surface:   #0f1219;
–card:      #141820;
–card-hi:   #191e28;
–border:    rgba(255,255,255,0.07);
–border-hi: rgba(255,255,255,0.12);
–text:      #eef0f5;
–text-dim:  #9aa0b0;
–text-mute: #4a5068;
–accent:    #3b82f6;
–live-red:  #ef4444;
–live-bg:   rgba(239,68,68,0.12);
–gold:      #f59e0b;
–green:     #22c55e;
–radius-lg: 18px;
–radius-md: 12px;
–radius-sm: 8px;
–safe-t:    env(safe-area-inset-top,    0px);
–safe-b:    env(safe-area-inset-bottom, 0px);
–safe-l:    env(safe-area-inset-left,   0px);
–safe-r:    env(safe-area-inset-right,  0px);
}

html { background: var(–bg); }

body {
font-family: ‘Inter’, system-ui, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100dvh;
-webkit-font-smoothing: antialiased;
-webkit-text-size-adjust: 100%;
overflow-x: hidden;
padding-bottom: calc(24px + var(–safe-b));
}

/* ── Header ───────────────────────────────────────────── */
.header {
position: sticky;
top: 0;
z-index: 50;
padding-top:    calc(var(–safe-t) + 12px);
padding-bottom: 12px;
padding-left:   calc(var(–safe-l) + 18px);
padding-right:  calc(var(–safe-r) + 18px);
background: rgba(8,10,15,0.88);
backdrop-filter: blur(24px) saturate(180%);
-webkit-backdrop-filter: blur(24px) saturate(180%);
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 12px;
}

.header-logo {
flex-shrink: 0;
width: 34px; height: 34px;
border-radius: 8px;
background: #013369;
border: 1px solid rgba(255,255,255,0.1);
display: flex; align-items: center; justify-content: center;
overflow: hidden;
}
.header-logo svg { width: 22px; height: 22px; }

.header-title {
font-family: ‘Oswald’, sans-serif;
font-weight: 700;
font-size: 1.25rem;
letter-spacing: 0.06em;
text-transform: uppercase;
color: var(–text);
flex: 1;
}

.live-indicator {
display: flex;
align-items: center;
gap: 6px;
font-size: 0.72rem;
font-weight: 600;
letter-spacing: 0.06em;
color: var(–live-red);
text-transform: uppercase;
opacity: 0;
transition: opacity 0.3s;
}
.live-indicator.show { opacity: 1; }

.live-dot {
width: 7px; height: 7px;
border-radius: 50%;
background: var(–live-red);
animation: pulsedot 1.6s ease-in-out infinite;
}

@keyframes pulsedot {
0%,100% { opacity:1; transform:scale(1);    }
50%     { opacity:.4; transform:scale(.65); }
}

.refresh-btn {
width: 34px; height: 34px;
border-radius: 50%;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-dim);
cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
-webkit-tap-highlight-color: transparent;
transition: background .15s, color .15s;
touch-action: manipulation;
}
.refresh-btn:active { background: var(–card-hi); color: var(–accent); }
.refresh-btn svg { width: 15px; height: 15px; }
.refresh-btn.spin svg { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tabs ─────────────────────────────────────────────── */
.tab-bar {
display: flex;
gap: 6px;
padding: 14px 14px 2px;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
flex: 1;
min-width: 80px;
padding: 9px 10px;
border: 1px solid var(–border);
border-radius: var(–radius-md);
background: var(–surface);
color: var(–text-dim);
font-family: ‘Oswald’, sans-serif;
font-weight: 500;
font-size: 0.8rem;
letter-spacing: 0.06em;
text-transform: uppercase;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
transition: all .2s;
touch-action: manipulation;
display: flex; align-items: center; justify-content: center;
gap: 6px;
}
.tab-btn.active { background: var(–card-hi); border-color: var(–border-hi); color: var(–text); }
.tab-btn.live-tab.active { border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.08); color: var(–live-red); }

.tab-count {
display: inline-flex;
align-items: center; justify-content: center;
min-width: 18px; height: 18px;
border-radius: 9px;
padding: 0 5px;
font-size: 0.68rem; font-weight: 700;
background: rgba(255,255,255,.08);
color: inherit;
}
.live-tab .tab-count.has-games { background: var(–live-red); color: #fff; }

/* ── Sections ─────────────────────────────────────────── */
.section { display: none; padding: 12px 12px 0; }
.section.active { display: block; }

/* ── Empty state ──────────────────────────────────────── */
.empty-state {
text-align: center;
padding: 52px 24px;
color: var(–text-mute);
}
.empty-state svg { width: 44px; height: 44px; margin-bottom: 14px; opacity: .25; display: block; margin-left: auto; margin-right: auto; }
.empty-state p { font-size: .875rem; font-weight: 500; }

/* ── Game Card ────────────────────────────────────────── */
.game-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–radius-lg);
overflow: hidden;
margin-bottom: 10px;
animation: cardin .28s ease both;
position: relative;
}
@keyframes cardin {
from { opacity:0; transform:translateY(6px); }
to   { opacity:1; transform:translateY(0);   }
}
.game-card.is-live { border-color: rgba(239,68,68,.22); }

/* red accent line top of live card */
.live-accent {
height: 2px;
background: linear-gradient(90deg, var(–live-red) 0%, transparent 75%);
}

/* status bar */
.card-top {
display: flex;
align-items: center;
justify-content: space-between;
padding: 9px 14px;
border-bottom: 1px solid var(–border);
background: var(–surface);
}

.status-pill {
display: inline-flex;
align-items: center;
gap: 5px;
padding: 3px 10px;
border-radius: 20px;
font-family: ‘Oswald’, sans-serif;
font-weight: 500;
font-size: 0.72rem;
letter-spacing: 0.08em;
text-transform: uppercase;
}
.pill-live  { background: var(–live-bg);              color: var(–live-red); }
.pill-final { background: rgba(100,110,130,.15);        color: var(–text-dim); }
.pill-pre   { background: rgba(59,130,246,.12);         color: #60a5fa; }
.pill-half  { background: rgba(245,158,11,.12);         color: var(–gold); }
.pill-dot   { width:5px; height:5px; border-radius:50%; background:currentColor; animation:pulsedot 1.6s ease-in-out infinite; }

.card-sub {
font-size: .75rem;
font-weight: 500;
color: var(–text-dim);
}

/* Main body */
.card-body {
display: grid;
grid-template-columns: 1fr 64px 1fr;
align-items: center;
padding: 18px 10px;
gap: 4px;
}

.team-col {
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
}

.logo-wrap {
position: relative;
width: 60px; height: 60px;
display: flex; align-items: center; justify-content: center;
}

.team-logo {
width: 56px; height: 56px;
object-fit: contain;
filter: drop-shadow(0 2px 8px rgba(0,0,0,.6));
display: block;
}

.poss-pip {
position: absolute;
bottom: -2px; right: -2px;
width: 15px; height: 15px;
border-radius: 50%;
background: var(–gold);
border: 2px solid var(–card);
display: flex; align-items: center; justify-content: center;
font-size: 8px; line-height: 1;
}

.team-abbr {
font-family: ‘Oswald’, sans-serif;
font-weight: 700;
font-size: 1.05rem;
letter-spacing: .04em;
text-transform: uppercase;
line-height: 1;
color: var(–text);
}

.team-record {
font-size: .7rem;
color: var(–text-mute);
font-weight: 500;
line-height: 1;
}

.timeouts {
display: flex; gap: 4px; align-items: center;
}
.to-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–text-mute);
border: 1px solid var(–border-hi);
}
.to-dot.active { background: var(–gold); border-color: var(–gold); }

/* Score center column */
.score-center {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
}
.scores-row {
display: flex; align-items: center; gap: 5px;
}
.score-num {
font-family: ‘Oswald’, sans-serif;
font-weight: 700;
font-size: 2.2rem;
line-height: 1;
color: var(–text);
min-width: 32px;
text-align: center;
}
.score-num.winner { color: var(–green); }
.score-num.loser  { color: var(–text-mute); }
.score-sep {
font-family: ‘Oswald’, sans-serif;
font-weight: 300;
font-size: 1.5rem;
color: var(–border-hi);
line-height: 1;
}
.vs-label {
font-family: ‘Oswald’, sans-serif;
font-weight: 500;
font-size: .85rem;
color: var(–text-mute);
letter-spacing: .06em;
}

/* Footer chips */
.card-footer {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
flex-wrap: wrap;
padding: 10px 14px 12px;
border-top: 1px solid var(–border);
}
.sit-chip {
display: inline-flex;
align-items: center;
gap: 4px;
padding: 4px 11px;
border-radius: var(–radius-sm);
background: var(–surface);
border: 1px solid var(–border);
font-family: ‘Oswald’, sans-serif;
font-weight: 500;
font-size: .78rem;
letter-spacing: .04em;
color: var(–text-dim);
}
.sit-chip.hl {
background: rgba(245,158,11,.1);
border-color: rgba(245,158,11,.22);
color: var(–gold);
}

/* ── Skeleton ─────────────────────────────────────────── */
.skel-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–radius-lg);
padding: 16px;
margin-bottom: 10px;
animation: shimmer 1.5s ease infinite;
}
.skel-bar {
height: 10px; border-radius: 6px;
background: rgba(255,255,255,.05);
margin-bottom: 10px;
}
.w60 { width:60%; } .w80 { width:80%; } .w40 { width:40%; }
.skel-big { height:56px; width:100%; border-radius:10px; background:rgba(255,255,255,.05); margin:10px 0; }
@keyframes shimmer { 0%,100%{opacity:1;} 50%{opacity:.45;} }

/* ── Footer note ──────────────────────────────────────── */
.footer-note {
text-align: center;
font-size: .7rem;
color: var(–text-mute);
padding: 10px 16px 0;
letter-spacing: .02em;
}
</style>

</head>
<body>

<!-- Header -->

<header class="header">
  <div class="header-logo">
    <svg viewBox="0 0 40 48" fill="none">
      <path d="M20 1L39 9.5V27C39 38 30 45 20 47C10 45 1 38 1 27V9.5L20 1Z" fill="#013369" stroke="#D50A0A" stroke-width="1.5"/>
      <text x="20" y="31" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="13" fill="white">NFL</text>
    </svg>
  </div>
  <span class="header-title">Scoreboard</span>
  <div class="live-indicator" id="liveInd">
    <span class="live-dot"></span>Live
  </div>
  <button class="refresh-btn" id="refreshBtn" aria-label="Refresh">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>
</header>

<!-- Tabs -->

<div class="tab-bar">
  <button class="tab-btn live-tab active" data-tab="live">Live <span class="tab-count" id="cLive">–</span></button>
  <button class="tab-btn" data-tab="pre">Upcoming <span class="tab-count" id="cPre">–</span></button>
  <button class="tab-btn" data-tab="post">Final <span class="tab-count" id="cPost">–</span></button>
</div>

<!-- Sections -->

<div class="section active" id="sec-live"><div id="g-live"></div></div>
<div class="section"        id="sec-pre"><div  id="g-pre"></div></div>
<div class="section"        id="sec-post"><div id="g-post"></div></div>

<p class="footer-note" id="footNote"></p>

<script>
const API      = 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard';
const LOGO_DIR = './logos/';
const EXTS     = ['.png','.PNG','.svg','.SVG','.webp','.WEBP','.jpg','.JPG'];

/* ── Logo img tag with ESPN fallback ── */
function logoImg(abbr, espnUrl) {
  const key = (abbr||'').toUpperCase();
  const srcs = [...EXTS.map(e => `${LOGO_DIR}${key}${e}`), espnUrl].filter(Boolean);
  if (!srcs.length) return '';
  // Build onerror chain: try each src in order
  let chain = '';
  for (let i = 1; i < srcs.length; i++) {
    const s = srcs[i].replace(/'/g, "\\'");
    chain = `this.src='${s}';` + (i < srcs.length - 1 ? chain : 'this.onerror=null;');
  }
  return `<img class="team-logo" src="${srcs[0]}" alt="${key}"
    onerror="${chain || 'this.onerror=null;'}"
    referrerpolicy="no-referrer" crossorigin="anonymous"/>`;
}

/* ── Pick best ESPN logo ── */
function pickLogo(logos) {
  if (!Array.isArray(logos)) return null;
  const byRel = r => logos.find(l => Array.isArray(l.rel) && l.rel.includes(r));
  return (byRel('scoreboard') || byRel('full') || logos[0])?.href || null;
}

/* ── Timeout dots ── */
function toDots(n) {
  n = Number(n) || 0;
  return `<div class="timeouts">${[0,1,2].map(i =>
    `<span class="to-dot${i < n ? ' active' : ''}"></span>`).join('')}</div>`;
}

/* ── Parse down & distance ── */
function parseDnDist(txt) {
  if (!txt) return null;
  const m = txt.match(/(1st|2nd|3rd|4th)\s*&\s*(\d+|Goal)/i);
  return m ? `${m[1].toUpperCase()} & ${m[2]}` : txt;
}

/* ── Date helpers ── */
function fmtGameTime(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
    + ' · ' + dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}
function fmtFinalDate(d) {
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

/* ── Parse ESPN scoreboard ── */
function parseGames(data) {
  return (data?.events || []).map(ev => {
    const comp   = ev.competitions?.[0] || {};
    const status = comp.status || {};
    const stName = status.type?.name || '';
    const state  = (status.type?.state || 'pre').toLowerCase();
    const period = status.period || 0;
    const clock  = status.displayClock || '';
    const isHalf = stName === 'STATUS_HALFTIME';
    const sit    = comp.situation || {};

    // Quarter label
    let qStr = '';
    if (isHalf) {
      qStr = 'Halftime';
    } else if (state === 'in' && period) {
      const q = period <= 4 ? `Q${period}` : (period === 5 ? 'OT' : `${period-4}OT`);
      qStr = clock ? `${q} · ${clock}` : q;
    }

    const teams = {};
    for (const c of comp.competitors || []) {
      const t = c.team || {};
      teams[c.homeAway] = {
        id:       t.id || '',
        abbr:     t.abbreviation || '',
        score:    c.score != null ? Number(c.score) : null,
        record:   c.records?.[0]?.summary || '',
        espnLogo: pickLogo(t.logos),
        timeouts: c.timeouts != null ? Number(c.timeouts) : null,
      };
    }

    return {
      id:       ev.id,
      date:     ev.date,
      state,
      isHalf,
      stName,
      qStr,
      possId:   sit.possession || null,
      dnDist:   parseDnDist(sit.shortDownDistanceText),
      away:     teams.away || {},
      home:     teams.home || {},
    };
  });
}

/* ── Build one card ── */
function buildCard(g) {
  const { away, home, state, isHalf, stName, qStr, possId, dnDist, date } = g;
  const isLive = state === 'in' || isHalf;
  const isPost = state === 'post';
  const isPre  = state === 'pre';

  const awayWins = isPost && away.score != null && home.score != null && away.score > home.score;
  const homeWins = isPost && away.score != null && home.score != null && home.score > away.score;
  const awayPoss = !!(possId && possId === away.id);
  const homePoss = !!(possId && possId === home.id);

  // Status pill
  let pill = '';
  if (isHalf) {
    pill = `<span class="status-pill pill-half">Halftime</span>`;
  } else if (isLive) {
    const hasOT = stName.includes('OT');
    pill = `<span class="status-pill pill-live"><span class="pill-dot"></span>${qStr || (hasOT ? 'OT' : 'Live')}</span>`;
  } else if (isPost) {
    const ot = stName.includes('OT') ? ' · OT' : '';
    pill = `<span class="status-pill pill-final">Final${ot}</span>`;
  } else {
    pill = `<span class="status-pill pill-pre">Upcoming</span>`;
  }

  // Right-side meta
  let meta = '';
  if (isPre)  meta = `<span class="card-sub">${fmtGameTime(date)}</span>`;
  if (isPost) meta = `<span class="card-sub">${fmtFinalDate(date)}</span>`;

  // Score or VS
  let scoreArea = '';
  if (isPre) {
    scoreArea = `<div class="vs-label">VS</div>`;
  } else {
    const ac = awayWins ? 'winner' : (isPost ? 'loser' : '');
    const hc = homeWins ? 'winner' : (isPost ? 'loser' : '');
    scoreArea = `<div class="scores-row">
      <span class="score-num ${ac}">${away.score ?? '–'}</span>
      <span class="score-sep">·</span>
      <span class="score-num ${hc}">${home.score ?? '–'}</span>
    </div>`;
  }

  // Footer
  let footer = '';
  if (isLive && !isHalf && (dnDist || qStr)) {
    footer = `<div class="card-footer">
      ${dnDist ? `<span class="sit-chip hl">🏈 ${dnDist}</span>` : ''}
      ${qStr ? `<span class="sit-chip">${qStr}</span>` : ''}
    </div>`;
  } else if (isHalf) {
    footer = `<div class="card-footer"><span class="sit-chip hl">Halftime</span></div>`;
  }

  return `<div class="game-card${isLive ? ' is-live' : ''}">
    ${isLive ? '<div class="live-accent"></div>' : ''}
    <div class="card-top">${pill}${meta}</div>
    <div class="card-body">
      <div class="team-col">
        <div class="logo-wrap">
          ${logoImg(away.abbr, away.espnLogo)}
          ${awayPoss ? '<div class="poss-pip">🏈</div>' : ''}
        </div>
        <span class="team-abbr">${away.abbr || '–'}</span>
        <span class="team-record">${away.record || ''}</span>
        ${isLive && away.timeouts != null ? toDots(away.timeouts) : ''}
      </div>
      <div class="score-center">${scoreArea}</div>
      <div class="team-col">
        <div class="logo-wrap">
          ${logoImg(home.abbr, home.espnLogo)}
          ${homePoss ? '<div class="poss-pip">🏈</div>' : ''}
        </div>
        <span class="team-abbr">${home.abbr || '–'}</span>
        <span class="team-record">${home.record || ''}</span>
        ${isLive && home.timeouts != null ? toDots(home.timeouts) : ''}
      </div>
    </div>
    ${footer}
  </div>`;
}

/* ── Skeletons ── */
function skeletons(n = 3) {
  return Array.from({length: n}, () => `
    <div class="skel-card">
      <div class="skel-bar w60"></div>
      <div class="skel-big"></div>
      <div class="skel-bar w80"></div>
      <div class="skel-bar w40"></div>
    </div>`).join('');
}

/* ── Empty state ── */
function emptyState(msg) {
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <ellipse cx="12" cy="12" rx="10" ry="7" transform="rotate(-30 12 12)"/>
      <line x1="3.5" y1="7.8" x2="20.5" y2="7.8"/>
      <line x1="3.5" y1="16.2" x2="20.5" y2="16.2"/>
      <line x1="12" y1="5" x2="12" y2="19"/>
    </svg>
    <p>${msg}</p>
  </div>`;
}

/* ── Render ── */
function render(games) {
  const live = games.filter(g => g.state === 'in' || g.isHalf);
  const pre  = games.filter(g => g.state === 'pre');
  const post = games.filter(g => g.state === 'post');

  document.getElementById('cLive').textContent = live.length || '–';
  document.getElementById('cPre').textContent  = pre.length  || '–';
  document.getElementById('cPost').textContent = post.length || '–';

  document.getElementById('liveInd').classList.toggle('show', live.length > 0);
  document.getElementById('cLive').classList.toggle('has-games', live.length > 0);

  document.getElementById('g-live').innerHTML = live.length
    ? live.map(buildCard).join('')
    : emptyState('No games in progress right now');

  document.getElementById('g-pre').innerHTML = pre.length
    ? pre.map(buildCard).join('')
    : emptyState('No upcoming games scheduled');

  document.getElementById('g-post').innerHTML = post.length
    ? post.map(buildCard).join('')
    : emptyState('No completed games today');

  document.getElementById('footNote').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
}

/* ── Fetch ── */
let busy = false;

async function load(showSkel = false) {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  if (showSkel) document.getElementById('g-live').innerHTML = skeletons(2);
  try {
    const res = await fetch(API, { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    render(parseGames(await res.json()));
  } catch (e) {
    console.error(e);
    document.getElementById('footNote').textContent = 'Failed to update — check your connection';
  } finally {
    btn.classList.remove('spin');
    busy = false;
  }
}

/* ── Tab switching ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + btn.dataset.tab).classList.add('active');
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => load(false));

/* ── Boot ── */
load(true);
setInterval(() => load(false), 30_000);
</script>

</body>
</html>
