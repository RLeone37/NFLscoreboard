<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Scores"/>
<meta name="theme-color" content="#07090e"/>
<title>Scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── Reset ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Force dark background on everything — prevents Safari light-mode bleed */
:root {
color-scheme: dark;
–bg:        #07090e;
–surface:   #0d1018;
–card:      #111520;
–card-hi:   #161b28;
–border:    rgba(255,255,255,0.08);
–border-hi: rgba(255,255,255,0.14);
–text:      #eef0f6;
–text-dim:  #8a92a8;
–text-mute: #3d4460;
–live-red:  #ef4444;
–live-bg:   rgba(239,68,68,0.11);
–gold:      #f59e0b;
–green:     #22c55e;
–blue:      #3b82f6;
–safe-t: env(safe-area-inset-top,    0px);
–safe-b: env(safe-area-inset-bottom, 0px);
–safe-l: env(safe-area-inset-left,   0px);
–safe-r: env(safe-area-inset-right,  0px);
/* Desktop sidebar width */
–sidebar-w: 220px;
/* Bottom nav height (mobile only) */
–nav-h: 68px;
}

html {
background: var(–bg) !important;
color: var(–text) !important;
}

body {
font-family: ‘Inter’, system-ui, -apple-system, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100dvh;
-webkit-font-smoothing: antialiased;
-webkit-text-size-adjust: 100%;
overflow-x: hidden;
/* Mobile: space for bottom nav */
padding-bottom: calc(var(–nav-h) + var(–safe-b));
}

/* ── Animations ─────────────────────────────────── */
@keyframes blink { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.3;transform:scale(.6);} }
@keyframes spin   { to { transform:rotate(360deg); } }
@keyframes up     { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }
@keyframes shimmer{ 0%,100%{opacity:1;} 50%{opacity:.4;} }

/* ═══════════════════════════════════════════════════
HEADER
═══════════════════════════════════════════════════ */
.header {
position: sticky;
top: 0;
z-index: 60;
padding-top:    calc(var(–safe-t) + 12px);
padding-bottom: 12px;
padding-left:   calc(var(–safe-l) + 16px);
padding-right:  calc(var(–safe-r) + 16px);
background: #07090e;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 10px;
}

.header-wordmark {
font-family: ‘Oswald’, sans-serif;
font-weight: 700;
font-size: 1.3rem;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–text);
flex: 1;
}

.live-pill {
display: flex;
align-items: center;
gap: 5px;
padding: 4px 10px;
border-radius: 20px;
background: var(–live-bg);
border: 1px solid rgba(239,68,68,.28);
font-size: 0.68rem;
font-weight: 600;
letter-spacing: 0.07em;
color: var(–live-red);
text-transform: uppercase;
opacity: 0;
transition: opacity .3s;
}
.live-pill.show { opacity: 1; }
.live-pill-dot {
width: 6px; height: 6px; border-radius: 50%;
background: var(–live-red);
animation: blink 1.6s ease-in-out infinite;
}

.refresh-btn {
width: 34px; height: 34px; border-radius: 50%;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-dim);
cursor: pointer;
display: flex; align-items: center; justify-content: center;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
transition: background .15s, color .15s;
flex-shrink: 0;
}
.refresh-btn:hover  { background: var(–card-hi); color: var(–text); }
.refresh-btn:active { background: var(–card-hi); color: var(–blue); }
.refresh-btn svg { width: 15px; height: 15px; }
.refresh-btn.spin svg { animation: spin .7s linear infinite; }

/* ═══════════════════════════════════════════════════
STATUS TABS  (Live / Upcoming / Final)
═══════════════════════════════════════════════════ */
.status-bar {
display: flex;
gap: 6px;
padding: 12px 14px 4px;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
background: var(–bg);
}
.status-bar::-webkit-scrollbar { display: none; }

.status-btn {
flex: 1;
min-width: 74px;
padding: 8px 10px;
border: 1px solid var(–border);
border-radius: 10px;
background: var(–surface);
color: var(–text-dim);
font-family: ‘Oswald’, sans-serif;
font-weight: 500;
font-size: 0.78rem;
letter-spacing: 0.06em;
text-transform: uppercase;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
transition: all .2s;
display: flex; align-items: center; justify-content: center;
gap: 6px;
}
.status-btn:hover  { background: var(–card); color: var(–text-dim); }
.status-btn.active { background: var(–card-hi); border-color: var(–border-hi); color: var(–text); }
.status-btn.live-status.active {
border-color: rgba(239,68,68,.35);
background: rgba(239,68,68,.08);
color: var(–live-red);
}

.scnt {
display: inline-flex; align-items: center; justify-content: center;
min-width: 17px; height: 17px;
border-radius: 9px; padding: 0 4px;
font-size: 0.64rem; font-weight: 700;
background: rgba(255,255,255,.08);
color: inherit;
}
.live-status .scnt.on { background: var(–live-red); color: #fff; }

/* ═══════════════════════════════════════════════════
MOBILE BOTTOM SPORT NAV
═══════════════════════════════════════════════════ */
.sport-bar {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 60;
height: calc(var(–nav-h) + var(–safe-b));
padding-bottom: var(–safe-b);
background: #07090e;
border-top: 1px solid var(–border);
display: flex;
}

.sport-btn {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 3px;
padding: 8px 4px 6px;
border: none;
background: transparent;
color: var(–text-mute);
cursor: pointer;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
transition: color .2s;
font-family: ‘Oswald’, sans-serif;
font-size: 0.65rem;
font-weight: 600;
letter-spacing: 0.08em;
text-transform: uppercase;
position: relative;
}
.sport-btn.active { color: var(–text); }
.sport-btn:hover  { color: var(–text-dim); }

.sport-icon {
font-size: 1.35rem;
line-height: 1;
transition: transform .2s;
}
.sport-btn.active .sport-icon { transform: scale(1.12); }

/* Active top bar on mobile */
.sport-btn::after {
content: ‘’;
position: absolute;
top: 0; left: 22%; right: 22%;
height: 2px;
border-radius: 0 0 3px 3px;
background: var(–text);
transform: scaleX(0);
transition: transform .25s;
}
.sport-btn.active::after { transform: scaleX(1); }

.live-badge {
display: none;
position: absolute;
top: 5px; right: calc(50% - 20px);
width: 8px; height: 8px;
border-radius: 50%;
background: var(–live-red);
border: 2px solid var(–bg);
}
.live-badge.show { display: block; }

/* ═══════════════════════════════════════════════════
LAYOUT — MOBILE default, DESKTOP override
═══════════════════════════════════════════════════ */

/* Game content area */
.sport-view { display: none; }
.sport-view.active { display: block; }

/* Sidebar hidden by default (mobile) */
.sidebar { display: none; }

.status-section { display: none; padding: 10px 12px 0; }
.status-section.active { display: block; }

/* Card grid — single column on mobile */
.cards-grid {
display: grid;
grid-template-columns: 1fr;
gap: 0; /* cards have their own margin-bottom */
}

/* ── DESKTOP (≥ 768px) ──────────────────────────── */
@media (min-width: 768px) {

body {
padding-bottom: 32px;
display: grid;
grid-template-columns: var(–sidebar-w) 1fr;
grid-template-rows: auto 1fr;
min-height: 100dvh;
}

/* Header spans full width */
.header {
grid-column: 1 / -1;
grid-row: 1;
padding-left: 28px;
padding-right: 28px;
}

/* Hide mobile bottom nav */
.sport-bar { display: none; }

/* Sidebar sport nav */
.sidebar {
display: flex;
flex-direction: column;
grid-column: 1;
grid-row: 2 / -1;
border-right: 1px solid var(–border);
background: var(–surface);
padding: 20px 0;
position: sticky;
top: 57px;
height: calc(100dvh - 57px);
overflow-y: auto;
}

.sidebar-btn {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 20px;
border: none;
background: transparent;
color: var(–text-mute);
cursor: pointer;
font-family: ‘Oswald’, sans-serif;
font-size: 0.9rem;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
width: 100%;
text-align: left;
transition: background .15s, color .15s;
position: relative;
border-radius: 0;
}
.sidebar-btn:hover  { background: rgba(255,255,255,.04); color: var(–text-dim); }
.sidebar-btn.active {
background: rgba(255,255,255,.07);
color: var(–text);
}
/* Left accent bar */
.sidebar-btn::before {
content: ‘’;
position: absolute;
left: 0; top: 20%; bottom: 20%;
width: 3px;
border-radius: 0 3px 3px 0;
background: var(–text);
transform: scaleY(0);
transition: transform .2s;
}
.sidebar-btn.active::before { transform: scaleY(1); }

.sidebar-icon { font-size: 1.3rem; flex-shrink: 0; }

.sidebar-live-dot {
width: 7px; height: 7px; border-radius: 50%;
background: var(–live-red);
margin-left: auto;
display: none;
animation: blink 1.6s ease-in-out infinite;
}
.sidebar-live-dot.show { display: block; }

/* Sport views fill main column */
.sport-view { grid-column: 2; }
.sport-view.active { display: block; }

.status-section { padding: 10px 24px 0; }

/* Card grid — 2 columns on medium desktop */
.cards-grid {
grid-template-columns: repeat(2, 1fr);
gap: 10px;
padding-bottom: 10px;
}
.cards-grid .game-card { margin-bottom: 0; }
}

/* 3-column grid on wide screens */
@media (min-width: 1200px) {
:root { –sidebar-w: 240px; }
.cards-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ═══════════════════════════════════════════════════
GAME CARDS
═══════════════════════════════════════════════════ */
.game-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 16px;
overflow: hidden;
margin-bottom: 10px;
animation: up .28s ease both;
position: relative;
}
.game-card.live { border-color: rgba(239,68,68,.24); }
.live-bar { height: 2px; background: linear-gradient(90deg,var(–live-red),transparent 70%); }

.card-top {
display: flex; align-items: center; justify-content: space-between;
padding: 8px 14px;
border-bottom: 1px solid var(–border);
background: var(–surface);
}

.status-pill {
display: inline-flex; align-items: center; gap: 5px;
padding: 3px 9px; border-radius: 20px;
font-family: ‘Oswald’, sans-serif;
font-weight: 500; font-size: 0.7rem; letter-spacing: .08em; text-transform: uppercase;
}
.p-live    { background:var(–live-bg);           color:var(–live-red); }
.p-final   { background:rgba(100,110,130,.13);     color:var(–text-dim); }
.p-pre     { background:rgba(59,130,246,.11);      color:#60a5fa; }
.p-special { background:rgba(245,158,11,.12);      color:var(–gold); }
.p-dot { width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.6s ease-in-out infinite; }

.card-meta { font-size:.73rem; font-weight:500; color:var(–text-dim); text-align:right; max-width:55%; }

.card-body {
display: grid;
grid-template-columns: 1fr 64px 1fr;
align-items: center;
padding: 16px 10px;
gap: 4px;
}

.team-col { display:flex; flex-direction:column; align-items:center; gap:6px; }

.logo-wrap {
position:relative; width:58px; height:58px;
display:flex; align-items:center; justify-content:center;
}
.team-logo {
width:54px; height:54px; object-fit:contain;
filter:drop-shadow(0 2px 8px rgba(0,0,0,.65));
display:block;
}

.poss-pip {
position:absolute; bottom:-2px; right:-2px;
width:14px; height:14px; border-radius:50%;
background:var(–gold); border:2px solid var(–card);
display:flex; align-items:center; justify-content:center;
font-size:7px; line-height:1;
}

.bases { position:absolute; bottom:-4px; right:-4px; width:24px; height:24px; }
.bases svg { width:24px; height:24px; }

.team-abbr {
font-family:‘Oswald’,sans-serif; font-weight:700; font-size:1rem;
letter-spacing:.04em; text-transform:uppercase; line-height:1; color:var(–text);
}
.team-record { font-size:.68rem; color:var(–text-mute); font-weight:500; line-height:1; }

.timeouts { display:flex; gap:4px; }
.to-dot { width:6px;height:6px;border-radius:50%;background:var(–text-mute);border:1px solid var(–border-hi); }
.to-dot.on { background:var(–gold);border-color:var(–gold); }

.score-center { display:flex; flex-direction:column; align-items:center; gap:2px; }
.scores-row   { display:flex; align-items:center; gap:5px; }
.score-num {
font-family:‘Oswald’,sans-serif; font-weight:700; font-size:2.2rem;
line-height:1; color:var(–text); min-width:30px; text-align:center;
}
.score-num.win { color:var(–green); }
.score-num.dim { color:var(–text-mute); }
.score-sep { font-family:‘Oswald’,sans-serif; font-weight:300; font-size:1.4rem; color:var(–border-hi); line-height:1; }
.vs-lbl { font-family:‘Oswald’,sans-serif; font-weight:500; font-size:.85rem; color:var(–text-mute); letter-spacing:.06em; }

.card-footer {
display:flex; align-items:center; justify-content:center;
gap:6px; flex-wrap:wrap; padding:9px 14px 11px;
border-top:1px solid var(–border);
}

.chip {
display:inline-flex; align-items:center; gap:4px;
padding:4px 10px; border-radius:7px;
background:var(–surface); border:1px solid var(–border);
font-family:‘Oswald’,sans-serif; font-weight:500; font-size:.76rem;
letter-spacing:.04em; color:var(–text-dim);
}
.chip.hl    { background:rgba(245,158,11,.09);  border-color:rgba(245,158,11,.22); color:var(–gold); }
.chip.blue  { background:rgba(59,130,246,.09);  border-color:rgba(59,130,246,.2);  color:#60a5fa; }
.chip.green { background:rgba(34,197,94,.09);   border-color:rgba(34,197,94,.2);   color:var(–green); }

/* ── MLB Linescore ─────────────────────────────── */
.linescore-wrap {
padding:0 14px 12px; border-top:1px solid var(–border);
overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.linescore-wrap::-webkit-scrollbar { display:none; }
.linescore {
width:100%; border-collapse:collapse;
font-family:‘Oswald’,sans-serif; font-size:0.72rem; font-weight:500;
margin-top:10px; min-width:280px;
}
.linescore th { color:var(–text-mute);font-weight:600;text-align:center;padding:0 5px 4px;letter-spacing:.05em; }
.linescore th.label-col { text-align:left;padding-left:0;min-width:36px; }
.linescore td { text-align:center;padding:3px 5px;color:var(–text-dim);border-radius:4px; }
.linescore td.label-col { text-align:left;font-weight:700;color:var(–text);padding-left:0; }
.linescore td.stat-col  { font-weight:700;color:var(–text); }
.linescore td.cur-cell  { color:var(–text);font-weight:700; }

/* ── Empty / Skeleton ──────────────────────────── */
.empty-state { text-align:center;padding:48px 24px;color:var(–text-mute); }
.empty-state svg { width:42px;height:42px;margin:0 auto 12px;display:block;opacity:.2; }
.empty-state p { font-size:.875rem;font-weight:500; }

.skel-card {
background:var(–card); border:1px solid var(–border);
border-radius:16px; padding:16px; margin-bottom:10px;
animation:shimmer 1.5s ease infinite;
}
.sb { height:10px;border-radius:6px;background:rgba(255,255,255,.05);margin-bottom:10px; }
.sw60{width:60%;} .sw80{width:80%;} .sw40{width:40%;}
.sb-big { height:54px;width:100%;border-radius:10px;background:rgba(255,255,255,.05);margin:10px 0; }

/* ── Footer note ───────────────────────────────── */
.footer-note {
text-align:center; font-size:.68rem; color:var(–text-mute);
padding:10px 16px 0; letter-spacing:.02em;
}
@media (min-width: 768px) {
.footer-note { grid-column:2; padding-left:24px; text-align:left; }
}
</style>

</head>
<body>

<!-- ── Header ───────────────────────────────────── -->

<header class="header">
  <span class="header-wordmark">Scores</span>
  <div class="live-pill" id="livePill"><span class="live-pill-dot"></span>Live</div>
  <button class="refresh-btn" id="refreshBtn" aria-label="Refresh">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>
</header>

<!-- ── Desktop sidebar (hidden on mobile via CSS) ── -->

<aside class="sidebar">
  <button class="sidebar-btn active" data-sport="nfl">
    <span class="sidebar-icon">🏈</span> NFL
    <span class="sidebar-live-dot" id="nfl-sdot"></span>
  </button>
  <button class="sidebar-btn" data-sport="mlb">
    <span class="sidebar-icon">⚾</span> MLB
    <span class="sidebar-live-dot" id="mlb-sdot"></span>
  </button>
  <button class="sidebar-btn" data-sport="nhl">
    <span class="sidebar-icon">🏒</span> NHL
    <span class="sidebar-live-dot" id="nhl-sdot"></span>
  </button>
</aside>

<!-- ── Sport views ───────────────────────────────── -->

<div class="sport-view active" id="view-nfl">
  <div class="status-bar">
    <button class="status-btn live-status active" data-status="live">Live <span class="scnt" id="cntLive">–</span></button>
    <button class="status-btn" data-status="pre">Upcoming <span class="scnt" id="cntPre">–</span></button>
    <button class="status-btn" data-status="post">Final <span class="scnt" id="cntPost">–</span></button>
  </div>
  <div class="status-section active" id="nfl-live"><div class="cards-grid" id="ng-live"></div></div>
  <div class="status-section"        id="nfl-pre"> <div class="cards-grid" id="ng-pre"></div></div>
  <div class="status-section"        id="nfl-post"><div class="cards-grid" id="ng-post"></div></div>
</div>
<div class="sport-view" id="view-mlb">
  <div class="status-bar">
    <button class="status-btn live-status active" data-status="live">Live <span class="scnt" id="mcntLive">–</span></button>
    <button class="status-btn" data-status="pre">Upcoming <span class="scnt" id="mcntPre">–</span></button>
    <button class="status-btn" data-status="post">Final <span class="scnt" id="mcntPost">–</span></button>
  </div>
  <div class="status-section active" id="mlb-live"><div class="cards-grid" id="mg-live"></div></div>
  <div class="status-section"        id="mlb-pre"> <div class="cards-grid" id="mg-pre"></div></div>
  <div class="status-section"        id="mlb-post"><div class="cards-grid" id="mg-post"></div></div>
</div>
<div class="sport-view" id="view-nhl">
  <div class="status-bar">
    <button class="status-btn live-status active" data-status="live">Live <span class="scnt" id="hcntLive">–</span></button>
    <button class="status-btn" data-status="pre">Upcoming <span class="scnt" id="hcntPre">–</span></button>
    <button class="status-btn" data-status="post">Final <span class="scnt" id="hcntPost">–</span></button>
  </div>
  <div class="status-section active" id="nhl-live"><div class="cards-grid" id="hg-live"></div></div>
  <div class="status-section"        id="nhl-pre"> <div class="cards-grid" id="hg-pre"></div></div>
  <div class="status-section"        id="nhl-post"><div class="cards-grid" id="hg-post"></div></div>
</div>

<p class="footer-note" id="footNote"></p>

<!-- ── Mobile bottom sport bar ───────────────────── -->

<nav class="sport-bar">
  <button class="sport-btn active" data-sport="nfl">
    <span class="live-badge" id="nfl-badge"></span>
    <span class="sport-icon">🏈</span>NFL
  </button>
  <button class="sport-btn" data-sport="mlb">
    <span class="live-badge" id="mlb-badge"></span>
    <span class="sport-icon">⚾</span>MLB
  </button>
  <button class="sport-btn" data-sport="nhl">
    <span class="live-badge" id="nhl-badge"></span>
    <span class="sport-icon">🏒</span>NHL
  </button>
</nav>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const APIS = {
  nfl: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard',
  mlb: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard',
  nhl: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard',
};



let activeSport = 'nfl';
let activeStatus = 'live';
let busy = false;
const cache = {}; // sport → parsed games

/* ═══════════════════════════════════════════════════
   SHARED HELPERS
═══════════════════════════════════════════════════ */
function pickLogo(logos) {
  if (!Array.isArray(logos)) return null;
  const byRel = r => logos.find(l => Array.isArray(l.rel) && l.rel.includes(r));
  return (byRel('scoreboard') || byRel('full') || logos[0])?.href || null;
}

function logoImg(abbr, espnUrl) {
  const key = (abbr || '').toUpperCase();
  const src = espnUrl || '';
  if (!src) return `<div style="width:54px;height:54px;"></div>`;
  return `<img class="team-logo" src="${src}" alt="${key}" referrerpolicy="no-referrer" crossorigin="anonymous"/>`;
}

function fmtTime(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
    + ' · ' + dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function skeletons(n=3) {
  return Array.from({length:n},()=>`
    <div class="skel-card">
      <div class="sb sw60"></div><div class="sb-big"></div>
      <div class="sb sw80"></div><div class="sb sw40"></div>
    </div>`).join('');
}
function emptyState(msg) {
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9 10h.01M15 10h.01M9.5 15a3.5 3.5 0 005 0"/>
    </svg>
    <p>${msg}</p>
  </div>`;
}

/* ═══════════════════════════════════════════════════
   NFL
═══════════════════════════════════════════════════ */
function parseNFL(data) {
  return (data?.events || []).map(ev => {
    const comp   = ev.competitions?.[0] || {};
    const status = comp.status || {};
    const stName = status.type?.name || '';
    const state  = (status.type?.state || 'pre').toLowerCase();
    const period = status.period || 0;
    const clock  = status.displayClock || '';
    const isHalf = stName === 'STATUS_HALFTIME';
    const sit    = comp.situation || {};
    let qStr = '';
    if (isHalf) qStr = 'Halftime';
    else if (state === 'in' && period) {
      const q = period <= 4 ? `Q${period}` : (period===5?'OT':`${period-4}OT`);
      qStr = clock ? `${q} · ${clock}` : q;
    }
    const teams = {};
    for (const c of comp.competitors || []) {
      const t = c.team || {};
      teams[c.homeAway] = {
        id: t.id||'', abbr: t.abbreviation||'',
        score: c.score != null ? Number(c.score) : null,
        record: c.records?.[0]?.summary || '',
        espnLogo: pickLogo(t.logos),
        timeouts: c.timeouts != null ? Number(c.timeouts) : null,
      };
    }
    const parseDnDist = txt => {
      if (!txt) return null;
      const m = txt.match(/(1st|2nd|3rd|4th)\s*&\s*(\d+|Goal)/i);
      return m ? `${m[1].toUpperCase()} & ${m[2]}` : txt;
    };
    return {
      sport:'nfl', id:ev.id, date:ev.date, state, isHalf, stName, qStr,
      possId: sit.possession || null,
      dnDist: parseDnDist(sit.shortDownDistanceText),
      away: teams.away||{}, home: teams.home||{},
    };
  });
}

function buildNFLCard(g) {
  const {away,home,state,isHalf,stName,qStr,possId,dnDist,date} = g;
  const isLive=state==='in'||isHalf, isPost=state==='post', isPre=state==='pre';
  const awW=isPost&&away.score>home.score, hwW=isPost&&home.score>away.score;
  const aP=!!(possId&&possId===away.id), hP=!!(possId&&possId===home.id);
  let pill=isHalf?`<span class="status-pill p-special">Halftime</span>`
    :isLive?`<span class="status-pill p-live"><span class="p-dot"></span>${qStr||'Live'}</span>`
    :isPost?`<span class="status-pill p-final">Final${stName.includes('OT')?' · OT':''}</span>`
    :`<span class="status-pill p-pre">Upcoming</span>`;
  let meta=isPre?`<span class="card-meta">${fmtTime(date)}</span>`
    :isPost?`<span class="card-meta">${fmtDate(date)}</span>`:'';
  let scoreArea=isPre?`<div class="vs-lbl">VS</div>`
    :`<div class="scores-row">
      <span class="score-num ${awW?'win':isPost?'dim':''}">${away.score??'–'}</span>
      <span class="score-sep">·</span>
      <span class="score-num ${hwW?'win':isPost?'dim':''}">${home.score??'–'}</span>
    </div>`;
  let footer='';
  if (isLive&&!isHalf&&(dnDist||qStr)) {
    footer=`<div class="card-footer">
      ${dnDist?`<span class="chip hl">🏈 ${dnDist}</span>`:''}
      ${qStr?`<span class="chip">${qStr}</span>`:''}
    </div>`;
  } else if (isHalf) {
    footer=`<div class="card-footer"><span class="chip hl">Halftime</span></div>`;
  }
  const toDots = n => `<div class="timeouts">${[0,1,2].map(i=>`<span class="to-dot${i<(Number(n)||0)?' on':''}"></span>`).join('')}</div>`;
  return `<div class="game-card${isLive?' live':''}">
    ${isLive?'<div class="live-bar"></div>':''}
    <div class="card-top">${pill}${meta}</div>
    <div class="card-body">
      <div class="team-col">
        <div class="logo-wrap">${logoImg(away.abbr,away.espnLogo)}${aP?'<div class="poss-pip">🏈</div>':''}</div>
        <span class="team-abbr">${away.abbr||'–'}</span>
        <span class="team-record">${away.record||''}</span>
        ${isLive&&away.timeouts!=null?toDots(away.timeouts):''}
      </div>
      <div class="score-center">${scoreArea}</div>
      <div class="team-col">
        <div class="logo-wrap">${logoImg(home.abbr,home.espnLogo)}${hP?'<div class="poss-pip">🏈</div>':''}</div>
        <span class="team-abbr">${home.abbr||'–'}</span>
        <span class="team-record">${home.record||''}</span>
        ${isLive&&home.timeouts!=null?toDots(home.timeouts):''}
      </div>
    </div>${footer}</div>`;
}

/* ═══════════════════════════════════════════════════
   MLB
═══════════════════════════════════════════════════ */
function parseMLB(data) {
  return (data?.events || []).map(ev => {
    const comp   = ev.competitions?.[0] || {};
    const status = comp.status || {};
    const stName = status.type?.name || '';
    const state  = (status.type?.state || 'pre').toLowerCase();
    const period = status.period || 0; // inning
    const sit    = comp.situation || {};
    const isDelayed = stName === 'STATUS_RAIN_DELAY' || stName === 'STATUS_DELAYED';
    const isSusp  = stName === 'STATUS_SUSPENDED';
    let innStr = '';
    if (state === 'in') {
      const half = sit.isTopInning ? 'Top' : 'Bot';
      innStr = period ? `${half} ${period}${ordSuffix(period)}` : 'In Progress';
    }
    const teams = {};
    for (const c of comp.competitors || []) {
      const t = c.team || {};
      const stats = {};
      for (const s of c.statistics||[]) stats[s.name] = s.displayValue;
      teams[c.homeAway] = {
        id:t.id||'', abbr:t.abbreviation||'',
        score: c.score != null ? Number(c.score) : null,
        record: c.records?.[0]?.summary || '',
        espnLogo: t.logo || pickLogo(t.logos),
        linescores: c.linescores || [],
        hits: stats.hits || '–',
        errors: stats.errors || '–',
        pitcher: c.probables?.[0] || null,
      };
    }
    // on-base situation
    const bases = {
      first:  !!(sit.onFirst),
      second: !!(sit.onSecond),
      third:  !!(sit.onThird),
    };
    return {
      sport:'mlb', id:ev.id, date:ev.date, state, stName, isDelayed, isSusp,
      innStr, period, isTopInning: sit.isTopInning,
      outs: sit.outs,
      balls: sit.balls, strikes: sit.strikes,
      bases,
      away: teams.away||{}, home: teams.home||{},
    };
  });
}

function ordSuffix(n) {
  const s=['th','st','nd','rd'], v=n%100;
  return s[(v-20)%10]||s[v]||s[0];
}

function buildBaseDiamond(bases) {
  // simple SVG diamond with bases lit
  const fc = b => b ? '#f59e0b' : '#2a3050';
  const sc = b => b ? '#f59e0b' : '#1e2540';
  return `<svg viewBox="0 0 24 24" fill="none">
    <!-- second base (top) -->
    <rect x="9" y="2" width="6" height="6" rx="1" fill="${fc(bases.second)}" stroke="${sc(bases.second)}" stroke-width="1"/>
    <!-- third base (left) -->
    <rect x="2" y="9" width="6" height="6" rx="1" fill="${fc(bases.third)}" stroke="${sc(bases.third)}" stroke-width="1"/>
    <!-- first base (right) -->
    <rect x="16" y="9" width="6" height="6" rx="1" fill="${fc(bases.first)}" stroke="${sc(bases.first)}" stroke-width="1"/>
    <!-- home (bottom) -->
    <rect x="9" y="16" width="6" height="6" rx="1" fill="#1e2540" stroke="#2a3050" stroke-width="1"/>
  </svg>`;
}

function buildMLBCard(g) {
  const {away,home,state,stName,innStr,period,isTopInning,outs,balls,strikes,bases,date,isDelayed,isSusp} = g;
  const isLive=state==='in', isPost=state==='post', isPre=state==='pre';
  const awW=isPost&&away.score>home.score, hwW=isPost&&home.score>away.score;

  let pillTxt='', pillCls='p-pre';
  if (isDelayed)    { pillTxt='Delayed'; pillCls='p-special'; }
  else if (isSusp)  { pillTxt='Suspended'; pillCls='p-special'; }
  else if (isLive)  { pillTxt=innStr||'Live'; pillCls='p-live'; }
  else if (isPost)  { pillTxt='Final'; pillCls='p-final'; }
  else              { pillTxt='Upcoming'; }

  const pill = isLive
    ? `<span class="status-pill ${pillCls}"><span class="p-dot"></span>${pillTxt}</span>`
    : `<span class="status-pill ${pillCls}">${pillTxt}</span>`;

  let meta = isPre ? `<span class="card-meta">${fmtTime(date)}</span>`
    : isPost ? `<span class="card-meta">${fmtDate(date)}</span>` : '';

  let scoreArea = isPre
    ? `<div class="vs-lbl">VS</div>`
    : `<div class="scores-row">
        <span class="score-num ${awW?'win':isPost?'dim':''}">${away.score??'–'}</span>
        <span class="score-sep">·</span>
        <span class="score-num ${hwW?'win':isPost?'dim':''}">${home.score??'–'}</span>
      </div>`;

  // inning arrow indicator under score
  let innArrow = '';
  if (isLive && period) {
    innArrow = `<span style="font-size:.65rem;color:var(--text-mute);margin-top:2px">${isTopInning?'▲':'▼'} ${period}${ordSuffix(period)}</span>`;
  }

  // Chips footer
  let chips = [];
  if (isLive) {
    if (outs != null) chips.push(`<span class="chip">${outs} Out${outs===1?'':'s'}</span>`);
    if (balls != null && strikes != null) chips.push(`<span class="chip">${balls}-${strikes}</span>`);
    if (bases.first || bases.second || bases.third) {
      chips.push(`<span class="chip hl" style="padding:4px 6px;">${buildBaseDiamond(bases)}</span>`);
    }
  }
  // Pitching starter (upcoming games)
  if (isPre) {
    if (away.pitcher) chips.push(`<span class="chip blue">⚾ ${away.pitcher.athlete?.shortName||''}</span>`);
    if (home.pitcher) chips.push(`<span class="chip blue">⚾ ${home.pitcher.athlete?.shortName||''}</span>`);
  }

  const footer = chips.length ? `<div class="card-footer">${chips.join('')}</div>` : '';

  // Linescore (live or final)
  let linescore = '';
  if ((isLive || isPost) && (away.linescores?.length || home.linescores?.length)) {
    const maxInn = Math.max(away.linescores.length, home.linescores.length);
    const headers = Array.from({length:maxInn},(_,i)=>i+1);
    const aRow = headers.map(i => {
      const ls = away.linescores.find(l=>l.period===i);
      const cur = isLive && period===i;
      return `<td${cur?' class="cur-cell"':''}>${ls?.displayValue??''}</td>`;
    });
    const hRow = headers.map(i => {
      const ls = home.linescores.find(l=>l.period===i);
      const cur = isLive && period===i;
      return `<td${cur?' class="cur-cell"':''}>${ls?.displayValue??''}</td>`;
    });
    linescore = `<div class="linescore-wrap">
      <table class="linescore">
        <thead><tr>
          <th class="label-col"></th>
          ${headers.map(i=>`<th>${i}</th>`).join('')}
          <th>R</th><th>H</th><th>E</th>
        </tr></thead>
        <tbody>
          <tr><td class="label-col">${away.abbr}</td>${aRow.join('')}
            <td class="stat-col">${away.score??''}</td>
            <td class="stat-col">${away.hits}</td>
            <td class="stat-col">${away.errors}</td>
          </tr>
          <tr><td class="label-col">${home.abbr}</td>${hRow.join('')}
            <td class="stat-col">${home.score??''}</td>
            <td class="stat-col">${home.hits}</td>
            <td class="stat-col">${home.errors}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
  }

  return `<div class="game-card${isLive?' live':''}">
    ${isLive?'<div class="live-bar"></div>':''}
    <div class="card-top">${pill}${meta}</div>
    <div class="card-body">
      <div class="team-col">
        <div class="logo-wrap">${logoImg(away.abbr,away.espnLogo)}</div>
        <span class="team-abbr">${away.abbr||'–'}</span>
        <span class="team-record">${away.record||''}</span>
      </div>
      <div class="score-center">${scoreArea}${innArrow}</div>
      <div class="team-col">
        <div class="logo-wrap">${logoImg(home.abbr,home.espnLogo)}</div>
        <span class="team-abbr">${home.abbr||'–'}</span>
        <span class="team-record">${home.record||''}</span>
      </div>
    </div>
    ${footer}
    ${linescore}
  </div>`;
}

/* ═══════════════════════════════════════════════════
   NHL
═══════════════════════════════════════════════════ */
function parseNHL(data) {
  return (data?.events || []).map(ev => {
    const comp   = ev.competitions?.[0] || {};
    const status = comp.status || {};
    const stName = status.type?.name || '';
    const state  = (status.type?.state || 'pre').toLowerCase();
    const period = status.period || 0;
    const clock  = status.displayClock || '';
    const sit    = comp.situation || {};
    const isOT   = stName.includes('OT') || period > 3;
    const isSO   = stName === 'STATUS_FINAL_PEN_SHOOTOUT' || stName === 'STATUS_PEN_SHOOTOUT';
    const isIntermission = stName === 'STATUS_INTERMISSION';

    let pStr = '';
    if (isIntermission) {
      pStr = `${periodLabel(period)} Intermission`;
    } else if (state === 'in') {
      pStr = clock ? `${periodLabel(period)} · ${clock}` : periodLabel(period);
    }

    function periodLabel(p) {
      if (p === 1) return '1st';
      if (p === 2) return '2nd';
      if (p === 3) return '3rd';
      if (p === 4) return isSO ? 'SO' : 'OT';
      return `${p-3}OT`;
    }

    const teams = {};
    for (const c of comp.competitors || []) {
      const t = c.team || {};
      const stats = {};
      for (const s of c.statistics||[]) stats[s.name] = s.displayValue;
      teams[c.homeAway] = {
        id:t.id||'', abbr:t.abbreviation||'',
        score: c.score != null ? Number(c.score) : null,
        record: c.records?.[0]?.summary || '',
        espnLogo: pickLogo(t.logos) || t.logo,
        shots: stats.shotsOnGoal || null,
        goalie: c.probables?.[0] || null,
      };
    }
    const isPP = !!(sit.isRedZone); // ESPN uses isRedZone for power play in some endpoints
    return {
      sport:'nhl', id:ev.id, date:ev.date, state, stName, pStr, period,
      isOT, isSO, isIntermission,
      away: teams.away||{}, home: teams.home||{},
    };
  });
}

function buildNHLCard(g) {
  const {away,home,state,stName,pStr,period,isOT,isSO,isIntermission,date} = g;
  const isLive=state==='in'||isIntermission, isPost=state==='post', isPre=state==='pre';
  const awW=isPost&&away.score>home.score, hwW=isPost&&home.score>away.score;

  let pillTxt, pillCls='p-pre';
  if (isIntermission) { pillTxt=pStr||'Intermission'; pillCls='p-special'; }
  else if (isLive)    { pillTxt=pStr||'Live'; pillCls='p-live'; }
  else if (isPost) {
    pillTxt = isSO ? 'Final · SO' : isOT ? 'Final · OT' : 'Final'; pillCls='p-final';
  } else { pillTxt='Upcoming'; }

  const pill = (isLive&&!isIntermission)
    ? `<span class="status-pill ${pillCls}"><span class="p-dot"></span>${pillTxt}</span>`
    : `<span class="status-pill ${pillCls}">${pillTxt}</span>`;

  let meta = isPre ? `<span class="card-meta">${fmtTime(date)}</span>`
    : isPost ? `<span class="card-meta">${fmtDate(date)}</span>` : '';

  let scoreArea = isPre
    ? `<div class="vs-lbl">VS</div>`
    : `<div class="scores-row">
        <span class="score-num ${awW?'win':isPost?'dim':''}">${away.score??'–'}</span>
        <span class="score-sep">·</span>
        <span class="score-num ${hwW?'win':isPost?'dim':''}">${home.score??'–'}</span>
      </div>`;

  let chips = [];
  if (isLive && pStr) chips.push(`<span class="chip">${pStr}</span>`);
  if (away.shots) chips.push(`<span class="chip">${away.abbr} ${away.shots} SOG</span>`);
  if (home.shots) chips.push(`<span class="chip">${home.abbr} ${home.shots} SOG</span>`);
  if (isPre) {
    if (away.goalie) chips.push(`<span class="chip blue">🥅 ${away.goalie.athlete?.shortName||''}</span>`);
    if (home.goalie) chips.push(`<span class="chip blue">🥅 ${home.goalie.athlete?.shortName||''}</span>`);
  }

  const footer = chips.length ? `<div class="card-footer">${chips.join('')}</div>` : '';

  return `<div class="game-card${isLive?' live':''}">
    ${isLive?'<div class="live-bar"></div>':''}
    <div class="card-top">${pill}${meta}</div>
    <div class="card-body">
      <div class="team-col">
        <div class="logo-wrap">${logoImg(away.abbr,away.espnLogo)}</div>
        <span class="team-abbr">${away.abbr||'–'}</span>
        <span class="team-record">${away.record||''}</span>
      </div>
      <div class="score-center">${scoreArea}</div>
      <div class="team-col">
        <div class="logo-wrap">${logoImg(home.abbr,home.espnLogo)}</div>
        <span class="team-abbr">${home.abbr||'–'}</span>
        <span class="team-record">${home.record||''}</span>
      </div>
    </div>
    ${footer}
  </div>`;
}

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function renderSport(sport, games) {
  const prefix = sport === 'nfl' ? 'n' : sport === 'mlb' ? 'm' : 'h';
  const builder = sport === 'nfl' ? buildNFLCard : sport === 'mlb' ? buildMLBCard : buildNHLCard;

  const live  = games.filter(g => g.state === 'in' || g.isHalf || g.isIntermission);
  const pre   = games.filter(g => g.state === 'pre');
  const post  = games.filter(g => g.state === 'post');

  document.getElementById(`${prefix}g-live`).innerHTML = live.length
    ? live.map(builder).join('') : emptyState('No games in progress');
  document.getElementById(`${prefix}g-pre`).innerHTML  = pre.length
    ? pre.map(builder).join('')  : emptyState('No upcoming games today');
  document.getElementById(`${prefix}g-post`).innerHTML = post.length
    ? post.map(builder).join('') : emptyState('No completed games today');

  // Live badge — mobile bottom nav + desktop sidebar
  document.getElementById(`${sport}-badge`).classList.toggle('show', live.length > 0);
  const sdot = document.getElementById(`${sport}-sdot`);
  if (sdot) sdot.classList.toggle('show', live.length > 0);
}

function updateCounts() {
  const pfx = { nfl:'', mlb:'m', nhl:'h' };
  ['nfl','mlb','nhl'].forEach(sport => {
    const games = cache[sport] || [];
    const p = pfx[sport];
    const liveN  = games.filter(g=>g.state==='in'||g.isHalf||g.isIntermission).length;
    const preN   = games.filter(g=>g.state==='pre').length;
    const postN  = games.filter(g=>g.state==='post').length;
    const cL = document.getElementById(`${p}cntLive`);
    const cP = document.getElementById(`${p}cntPre`);
    const cPo= document.getElementById(`${p}cntPost`);
    if (cL)  { cL.textContent  = liveN  || '–'; cL.classList.toggle('on', liveN > 0); }
    if (cP)  cP.textContent  = preN   || '–';
    if (cPo) cPo.textContent = postN  || '–';
  });
  // Header live pill — show if current sport has live games
  const cur = cache[activeSport] || [];
  const anyLive = cur.some(g=>g.state==='in'||g.isHalf||g.isIntermission);
  document.getElementById('livePill').classList.toggle('show', anyLive);
}

/* ═══════════════════════════════════════════════════
   FETCH
═══════════════════════════════════════════════════ */
async function loadSport(sport, showSkel=false) {
  if (showSkel) {
    const prefix = sport==='nfl'?'n':sport==='mlb'?'m':'h';
    document.getElementById(`${prefix}g-live`).innerHTML = skeletons(2);
  }
  try {
    const res = await fetch(APIS[sport], { cache:'no-store' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const parsed = sport==='nfl' ? parseNFL(data) : sport==='mlb' ? parseMLB(data) : parseNHL(data);
    cache[sport] = parsed;
    renderSport(sport, parsed);
  } catch (e) {
    console.error(sport, e);
  }
}

async function loadAll(showSkel=false) {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  if (showSkel) {
    const prefix = activeSport==='nfl'?'n':activeSport==='mlb'?'m':'h';
    document.getElementById(`${prefix}g-live`).innerHTML = skeletons(2);
  }
  await Promise.all(Object.keys(APIS).map(s => loadSport(s, false)));
  updateCounts();
  document.getElementById('footNote').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
  btn.classList.remove('spin');
  busy = false;
}

/* ═══════════════════════════════════════════════════
   UI INTERACTIONS
═══════════════════════════════════════════════════ */
function switchSport(sport) {
  if (sport === activeSport) return;
  // Mobile bottom nav
  document.querySelectorAll('.sport-btn').forEach(b => b.classList.toggle('active', b.dataset.sport === sport));
  // Desktop sidebar
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.toggle('active', b.dataset.sport === sport));
  // Sport views
  document.querySelectorAll('.sport-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${sport}`).classList.add('active');
  activeSport = sport;
  updateCounts();
  if (!cache[sport]) loadSport(sport, true).then(updateCounts);
}

// Mobile sport buttons
document.querySelectorAll('.sport-btn').forEach(btn => {
  btn.addEventListener('click', () => switchSport(btn.dataset.sport));
});

// Desktop sidebar buttons
document.querySelectorAll('.sidebar-btn').forEach(btn => {
  btn.addEventListener('click', () => switchSport(btn.dataset.sport));
});

// Status tabs — each sport view has its own set
document.querySelectorAll('.status-bar').forEach(bar => {
  bar.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const status = btn.dataset.status;
      // Deactivate all tabs in this bar
      bar.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Find parent sport-view and toggle its sections
      const view = bar.closest('.sport-view');
      if (view) {
        view.querySelectorAll('.status-section').forEach(s => s.classList.remove('active'));
        const sport = view.id.replace('view-','');
        const el = document.getElementById(`${sport}-${status}`);
        if (el) el.classList.add('active');
      }
    });
  });
});

// Refresh
document.getElementById('refreshBtn').addEventListener('click', () => loadAll(false));

/* ═══════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════ */
loadAll(true);
setInterval(() => loadAll(false), 30_000);
</script>
